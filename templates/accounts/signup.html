{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="section-padding">
    <div class="container">
        <div style="max-width: 500px; margin: 0 auto; background: var(--bg-card); padding: 3rem; border-radius: 24px; border: 1px solid var(--glass-border);">
            <h2 style="text-align: center; margin-bottom: 2rem;">Create Account</h2>
            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div style="color: var(--accent); font-size: 0.85rem; margin-top: 0.2rem;">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign Up</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
                Already have an account? <a href="{% url 'accounts:login' %}" style="color: var(--primary);">Login</a>
            </p>
        </div>
    </div>
</section>

<style>
    input, select {
        width: 100%;
        background: var(--bg-dark);
        border: 1px solid var(--glass-border);
        padding: 0.8rem 1rem;
        border-radius: 12px;
        color: white;
        outline: none;
    }
    input:focus {
        border-color: var(--primary);
    }
</style>
{% endblock %}
