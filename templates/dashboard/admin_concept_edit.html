{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<style>
    .admin-container {
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: calc(100vh - 80px);
        margin-top: 80px;
    }

    .sidebar { background: #0f172a; border-right: 1px solid rgba(255,255,255,0.05); padding: 2rem; }
    .main-content { padding: 3rem; background: #020617; }

    .menu-item {
        display: flex;
        align-items: center; gap: 1rem; padding: 1rem 1.5rem; border-radius: 12px;
        color: #94a3b8; text-decoration: none; transition: 0.3s;
    }

    .menu-item:hover, .menu-item.active { background: rgba(99, 102, 241, 0.1); color: white; }

    .edit-card {
        background: #1e293b;
        border-radius: 24px;
        padding: 3rem;
        border: 1px solid rgba(255,255,255,0.05);
        max-width: 1000px;
        margin: 0 auto;
    }

    .form-group { margin-bottom: 2rem; }
    .form-group label { display: block; color: #94a3b8; margin-bottom: 0.8rem; font-weight: 600; }
    .form-group input, .form-group textarea {
        width: 100%;
        background: #0f172a;
        border: 1px solid rgba(255,255,255,0.05);
        padding: 1.2rem;
        border-radius: 12px;
        color: white;
        font-size: 1rem;
        font-family: inherit;
    }

    .form-group textarea { height: 200px; resize: vertical; }

    .btn-save {
        background: var(--primary);
        color: white;
        width: 100%;
        padding: 1.2rem;
        border-radius: 12px;
        border: none;
        font-weight: 800;
        font-size: 1.1rem;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-save:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
</style>
{% endblock %}

{% block content %}
<div class="admin-container">
    <aside class="sidebar">
        <h2 style="color: white; margin-bottom: 2rem; font-size: 1.2rem;">ADMIN PANEL 🔥</h2>
        <nav class="sidebar-menu">
            <a href="{% url 'dashboard:admin_panel' %}" class="menu-item">
                <i class="fas fa-chart-pie"></i> Overview
            </a>
            <a href="{% url 'dashboard:admin_content' %}" class="menu-item active">
                <i class="fas fa-book"></i> Content Manager
            </a>
            <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.05); margin: 1.5rem 0;">
            <a href="{% url 'dashboard:admin_level_detail' concept.level.id %}" class="menu-item">
                <i class="fas fa-arrow-left"></i> Back to Level
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="header" style="text-align: center; margin-bottom: 3rem;">
            <h1 style="color: white;">Edit Concept: {{ concept.name }} ✍️</h1>
            <p style="color: #94a3b8;">Modify the learning material, examples, and exercises.</p>
        </div>

        <div class="edit-card">
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Concept Name</label>
                    <input type="text" name="name" value="{{ concept.name }}" required>
                </div>
                
                <div class="form-group">
                    <label>Phase 1: Learning Content (JSON/Markdown)</label>
                    <textarea name="content">{{ concept.content }}</textarea>
                </div>

                <div class="form-group">
                    <label>Phase 2: Examples (JSON)</label>
                    <textarea name="examples">{{ concept.examples }}</textarea>
                </div>

                <div class="form-group">
                    <label>Phase 3 & 4: Exercises / Speaking (JSON)</label>
                    <textarea name="exercises">{{ concept.exercises }}</textarea>
                </div>

                <div class="form-group">
                    <label>Grammar Rules (Optional)</label>
                    <textarea name="grammar_rules">{{ concept.grammar_rules }}</textarea>
                </div>

                <div class="form-group">
                    <label>Common Mistakes (Optional)</label>
                    <textarea name="common_mistakes">{{ concept.common_mistakes }}</textarea>
                </div>

                <button type="submit" class="btn-save">
                    <i class="fas fa-save"></i> Save Changes
                </button>
            </form>
        </div>
    </main>
</div>
{% endblock %}
